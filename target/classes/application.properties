# Spring Boot Application Configuration
spring.application.name=spring-ai-chatbot
server.port=8080

# Spring AI OpenAI Configuration
# Replace 'your-api-key-here' with your actual OpenAI API key
spring.ai.openai.api-key=${OPENAI_API_KEY:your-api-key-here}

# Optional: Configure the model (default is gpt-3.5-turbo)
spring.ai.openai.chat.options.model=gpt-3.5-turbo

# Optional: Configure temperature (higher = more creative, lower = more focused)
spring.ai.openai.chat.options.temperature=0.7

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.springaichatbot=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Application information
info.app.name=Spring AI Chatbot
info.app.description=A simple AI chatbot REST API using Spring AI and OpenAI
info.app.version=1.0.0

